<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单</title>
</head>
<body>
    
    <form action="https://search.jd.com/search" target="_blank">
        <fieldset>
            <legend>主要信息</legend>
            <label for="zhanghu">账户：</label>
            <input id= "zhanghu" type="text" name="account" value="" maxlength="10"><br>
            <label>
                密码：
                <input id="mima" type="password" name="pwd" value="" maxlength="10">
            </label>
            性别：
            <input type="radio" name="gander" value="male" id="nan">
            <label for="nan">男</label>
            <label>
            <input type="radio" name="gander" value="female" checked>女<br>
            </label>
        </fieldset>
        <br>
        <fieldset>
            <legend>附加信息</legend>
            爱好：
            <label>
            <input type="checkbox" name="hobby" value="smoke">抽烟
            </label>
            <label>
            <input type="checkbox" name="hobby" value="drink">喝酒
            </label>
            <label>
            <input type="checkbox" name="hobby" value="perm">烫头
            </label>
            <br>
            <label for="qita">其他：</label>
            <textarea id="qita" name="other" cols="25" rows="3"></textarea><br>
            籍贯：
            <select name="place">
                <option value="陕">陕西</option>
                <option value="鄂">湖北</option>
                <option value="晋">山西</option>
            </select>
        </fieldset>
        <input type="hidden" name="tag" value="123">
        <br>
        <button>确认</button>
        <!-- <input type="submit" value="提交"> -->
        <button type="reset">重置</button>
        <!-- <input type="reset"> -->
        <button type="button">检测账户是否被注册</button>
        <!-- <input type="button" value="检测账户是否被注册"> -->
    </form>


</body>
</html>
