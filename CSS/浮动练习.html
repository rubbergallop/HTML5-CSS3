<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer{
            width: 500px;
            background-color: gray;
            border: 1px solid black;
        }
        .box {
            width: 100px;
            height: 100px;
            background-color: skyblue;
            border: 1px solid black;
            margin: 10px;
        }
        .first,.second,.third,.forth{
            float: left;
        }
        /* .forth {
            clear:both
        } */
         .outer::after {
            content: '';
            display: block;
            clear: both;
         }
    </style>
</head>
<body>
    <div class="outer">
        <!-- <div class="box zero">
            盒子0
        </div> -->
        <div class="box first">
            盒子1
        </div>
        <div class="box second">
            盒子2
        </div>
        <div class="box third">
            盒子3
        </div>
        <div class="box forth">
            盒子4
        </div>
        <div class="box fifth">
            盒子5
        </div>
    </div>

</body>
</html>
