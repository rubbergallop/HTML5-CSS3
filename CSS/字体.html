<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .at1 {
            font-size: 100px;
            font:italic bold 200px "翩翩体-简";

        }
        .at2 {
            font-size: 100px;

        }
        .at4 {
            font-size: 100px;

            text-decoration:line-through wavy green;
            text-indent:400px;
        }

            font-size: 40px;
            background-color: orange;
        }

</head>
<body>
    <div class="at1">一号</div>
    <div class="at2">二号</div>
    <div class="at3">三 号</div>

</html>
