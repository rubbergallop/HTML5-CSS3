<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        账号：<input type="text" name="account" placeholder="请输入账号" required autofocus autocomplete="off" pattern="\w{6}">
        <br>
        密码：<input type="password" name="pwd" placeholder="请输入密码">
        <br>
        性别：
            <input type="radio" value="male" name="gender">男
            <input type="radio" value="female" name="gender">女
        <br>
        爱好：
            <input type="checkbox" value="sing-dance" name="hobby">唱跳
            <input type="checkbox" value="rap" name="hobby">rap
            <input type="checkbox" value="baseketball" name="hobby">篮球
            <br>
        其他：<textarea name="other"></textarea>
        <br>
        <button>提交</button>
    </form>
</body>
</html>
