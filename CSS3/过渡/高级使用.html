<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer {
            width: 1000px;
            height: 900px;
            border: 1px solid black;
        }
        .outer:hover .box{
            width: 1000px;
        }
        .box {
            width: 200px;
            height: 100px;
            transition-property: all;
            transition-duration:3s;
            /* transition-delay: 2s; */
        }
        .box1 {
            background-color: skyblue;
            transition-timing-function:ease;
        }
        .box2 {
            background-color: red;
            transition-timing-function:linear;
        }
        .box3 {
            background-color: yellow;
            transition-timing-function:ease-in;
        }
        .box4 {
            background-color: green;
            transition-timing-function:ease-out;
        }
        .box5 {
            background-color: tomato;
            transition-timing-function:ease-in-out;
        }
        .box6 {
            background-color: chocolate;
            transition-timing-function:step-start;
        }
        .box7 {
            background-color: violet;
            transition-timing-function:step-end;
        }
        .box8 {
            background-color: purple;
            transition-timing-function:steps(20,end);
        }
        .box9 {
            background-color: gray;
            transition-timing-function:cubic-bezier(1,-0.07,.89,1.88);
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="box box1">ease</div>
        <div class="box box2">linear</div>
        <div class="box box3">ease-in</div>
        <div class="box box4">ease-out</div>
        <div class="box box5">ease-in-out</div>
        <div class="box box6">step-start</div>
        <div class="box box7">step-end</div>
        <div class="box box8">steps</div>
        <div class="box box9 ">cubic-bezier</div>
    </div>
</body>
</html>
