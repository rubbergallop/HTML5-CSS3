<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        h1 {
            height: 200px;
            background-color: gray;
            text-align: center;
            line-height: 200px;
            font-size: 100px;
        }
        @media (width:800px) {
            h1 {
                background-color: green;
            }
        }
        @media (max-width:700px) {
            h1 {

            }
        }
        @media (min-width:900px){
            h1 {
                background-color: skyblue;
            }
        }
