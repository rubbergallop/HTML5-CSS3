<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1 {
            width: 200px;
            height: 200px;
            background-color: deepskyblue;
            padding: 5px;
            border: 5px solid black;
        }
        .box2 {
            width: 200px;
            height: 200px;
            background-color: green;
            padding: 5px;
            border: 5px solid black;
            box-sizing: border-box;
        }
        .box3 {
            width: 200px;
            height: 200px;
            background-color: orange;
            resize: both;
            overflow: hidden;
        }
        .box4 {
            width: 200px;
            height: 200px;
            background-color: yellow;
            margin: 0 auto;
            margin-top: 100px;
            font-size: 40px;
            /* box-shadow: 10px 10px; */

            /* box-shadow: 10px 10px blue; */

            /* box-shadow: 10px 10px 10px; */

            /* box-shadow: 10px 10px 20px blue; */

            /* box-shadow: 10px 10px 20px 10px blue; */

            /* box-shadow: 0px 0px 30px 0px red inset; */
            position: relative;
            top: 0px;
            left: 0;
            transition: 0.3s linear all;
        }
        .box4:hover {
            box-shadow: 0px 0px 10px 0px black;

        }
        .box5 {
            width: 200px;
            height: 200px;
            background-color: yellow;
            font-size: 40px;
            opacity: 0.23;
        }
        .box6 {
            position: relative;
            width: 500px;
        }
        h1 {
            position: absolute;
            top: 0;
            left: 0;
            background-color: black;
            color: white;
            width: 100%;
            line-height: 50px;
            text-align: center;
            font-size: 40px;
            opacity: 0.5;
            margin: 0 0;
        }
    </style>
</head>
