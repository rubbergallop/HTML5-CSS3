<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer {
            width: 200px;
            height: 200px;
            border: 2px solid black;
            margin: 0 auto;
            margin-top: 100px;
            transform-style: preserve-3d;
            perspective: 200px;
            perspective-origin: 102px 102px;
        }
        .inner {
            width: 200px;
            height: 200px;
            background-color: rgba(255, 20, 145, 0.72);
            /* transform: scaleZ(2) rotateY(45deg); */
            transform: scale3d(1.5,1.5,1);
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner">666</div>
    </div>
</body>
</html>
